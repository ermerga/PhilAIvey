server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # React SPA fallback
    # Any URL that doesn't match a real file gets served index.html so that
    # React Router can handle client-side navigation.
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # API proxy
    # Requests to /api/* are forwarded to the FastAPI backend.
    # The frontend calls /api/game/new and nginx rewrites it to /game/new.
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------------------------------------------------------------------------
    # WebSocket proxy
    # Requests to /ws/* are forwarded as WebSocket connections to the backend.
    # The Upgrade and Connection headers are required for WebSocket handshakes.
    # ---------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
